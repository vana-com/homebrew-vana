name: Test Formula

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - name: Tap local repository
        run: brew tap vana-com/vana "file://$GITHUB_WORKSPACE"
      - name: Install formula from tap repo
        run: brew install vana
      - name: Verify installed vana
        run: vana status --json
