name: Test Formula

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - name: Install formula from tap repo
        run: brew install --formula ./Formula/vana.rb
      - name: Verify installed vana
        run: vana status --json
